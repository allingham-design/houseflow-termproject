<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Chores - HouseFlow</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar is-fixed-top" role="navigation" aria-label="main navigation">
    <div class="container">
      <div class="navbar-brand">
        <a class="navbar-item" href="dashboard.html">
          HouseFlow
        </a>
      </div>
      <div class="navbar-menu">
        <div class="navbar-start">
          <a class="navbar-item" href="dashboard.html">Dashboard</a>
          <a class="navbar-item is-active" href="chores.html">Manage Chores</a>
          <a class="navbar-item" href="expenses.html">Expenses</a>
        </div>
        <div class="navbar-end">
          <div class="navbar-item">
            <button class="button btn-outline is-small">Log Out</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <section class="section" style="padding-top: 5rem;">
    <div class="container">

      <div class="columns">

        <!-- Left: Add Chore Form -->
        <div class="column is-5">
          <div class="card">
            <div class="card-content">
              <h2 class="section-title mb-2">Add New Chore</h2>

              <div class="field">
                <label class="label" for="chore-title">Chore Title</label>
                <div class="control">
                  <input class="input" type="text" id="chore-title" placeholder="e.g. Wash Dishes">
                </div>
              </div>

              <div class="field">
                <label class="label" for="chore-description">Description</label>
                <div class="control">
                  <textarea class="textarea" id="chore-description" placeholder="What does this chore involve?" rows="2"></textarea>
                </div>
              </div>

              <div class="field">
                <label class="label" for="chore-assigned">Assign To</label>
                <div class="control">
                  <div class="select is-fullwidth">
                    <select id="chore-assigned">
                      <option value="user1">Danny Nguyen</option>
                      <option value="user2">Brittney Vo</option>
                      <option value="user3">Richie Huynh</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="columns">
                <div class="column">
                  <div class="field">
                    <label class="label" for="chore-due">Due Date</label>
                    <div class="control">
                      <input class="input" type="date" id="chore-due">
                    </div>
                  </div>
                </div>
                <div class="column">
                  <div class="field">
                    <label class="label" for="chore-recurrence">Recurrence</label>
                    <div class="control">
                      <div class="select is-fullwidth">
                        <select id="chore-recurrence">
                          <option value="once">One-time</option>
                          <option value="daily">Daily</option>
                          <option value="weekly">Weekly</option>
                          <option value="biweekly">Biweekly</option>
                          <option value="monthly">Monthly</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="field mt-3">
                <button class="button btn-primary is-medium is-fullwidth">
                  Add Chore
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Right: Placeholder for chore table -->
        <div class="column is-7">
          <div class="section-header">
            <h2 class="section-title">All Chores</h2>
          </div>

          <div class="has-text-centered text-muted" style="padding: 3rem;">
            <p>No chores yet. Add one using the form.</p>
          </div>
        </div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container has-text-centered">
      <p>HouseFlow &copy; 2026 &mdash; IS424 Group 6 Project</p>
    </div>
  </footer>

</body>
</html>
